name: Compile and Upload Kubeflow Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install kfp  # Ensures the SDK is available for the upload

    - name: Compile Pipeline YAML
      run: |
        # Generates the mlflow_kubeflow_pipeline.yaml
        python throughkubeflow_mlflowloggging_withoutcache_v1.py

    - name: Upload and Execute Pipeline
      run: |
        python -c "
        import kfp
        import time
        
        host_url = 'https://filling-risk-lingo.ngrok-free.dev'
        client = kfp.Client(host=host_url)
        
        pipeline_name = 'iris-classifier-automated'
        file_path = 'mlflow_kubeflow_pipeline.yaml'
        run_name = f'run-{int(time.time())}'

        try:
            # 1. Upload the pipeline
            pipeline = client.upload_pipeline(
                pipeline_package_path=file_path,
                pipeline_name=pipeline_name
            )
            # In KFP v2, use pipeline_id instead of id
            pipeline_id = pipeline.pipeline_id
            print(f'Pipeline uploaded. ID: {pipeline_id}')
        except Exception as e:
            print(f'Upload check: {e}')
            print('Fetching existing pipeline ID...')
            pipelines = client.list_pipelines()
            # In KFP v2, the object is 'pipeline_id' and 'display_name'
            pipeline_id = next(p.pipeline_id for p in pipelines.pipelines if p.display_name == pipeline_name)

        # 2. Trigger the Run
        try:
            run_result = client.create_run_from_pipeline_id(
                pipeline_id=pipeline_id,
                run_name=run_name,
                experiment_name='Default'
            )
            print(f'Run created successfully! Name: {run_name}')
        except Exception as e:
            print(f'Failed to create run: {e}')
        "